<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Переписка')}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="chat-page">
    <div class="section-heading">
        <div>
            <span class="eyebrow">сообщения</span>
            <h1>Чат</h1>
        </div>
    </div>
    <div class="chat-workspace">
        <aside class="chat-sidebar">
            <a class="chat-row reveal"
               th:each="conversation : ${conversations}"
               th:with="rowProduct=${conversation.product}, user=${conversation.counterpart}, last=${conversation.lastMessage}"
               th:classappend="${rowProduct.id.equals(product.id) && user.username.equalsIgnoreCase(counterpart.username)} ? 'active' : ''"
               th:href="@{/chats/products/{productId}/users/{username}(productId=${rowProduct.id}, username=${user.username})}">
                <span class="chat-avatar">
                    <img th:if="${user.avatarUrl != null && !user.avatarUrl.isBlank()}" th:src="${user.avatarUrl}" th:alt="${user.fullName}">
                    <span th:if="${user.avatarUrl == null || user.avatarUrl.isBlank()}"
                          th:text="${#strings.substring(user.fullName, 0, 1)}">U</span>
                </span>
                <span class="chat-copy">
                    <strong>
                        <span th:text="${rowProduct.title}">Товар</span>
                        <small th:text="'(@' + ${user.username} + ')'">(@user)</small>
                    </strong>
                    <em th:text="${#strings.abbreviate(last.body, 72)}">Сообщение</em>
                </span>
                <span class="chat-product-thumb">
                    <img th:src="${rowProduct.imageUrl}" th:alt="${rowProduct.title}">
                </span>
            </a>
        </aside>
        <section class="content-panel chat-thread reveal">
            <header class="chat-thread-head">
                <span class="chat-avatar">
                    <img th:if="${counterpart.avatarUrl != null && !counterpart.avatarUrl.isBlank()}" th:src="${counterpart.avatarUrl}" th:alt="${counterpart.fullName}">
                    <span th:if="${counterpart.avatarUrl == null || counterpart.avatarUrl.isBlank()}"
                          th:text="${#strings.substring(counterpart.fullName, 0, 1)}">U</span>
                </span>
                <div>
                    <span class="eyebrow">переписка</span>
                    <h1>
                        <span th:text="${product.title}">Товар</span>
                        <small th:text="'(@' + ${counterpart.username} + ')'">(@user)</small>
                    </h1>
                    <p th:text="${counterpart.fullName}">Пользователь</p>
                </div>
                <a class="chat-product-thumb" th:href="@{/products/{id}(id=${product.id})}">
                    <img th:src="${product.imageUrl}" th:alt="${product.title}">
                </a>
            </header>
            <div class="message-list" data-message-list>
                <article th:each="message : ${messages}" class="message" th:classappend="${message.sender.username.equalsIgnoreCase(currentUser.username)} ? 'own' : ''">
                    <span class="message-avatar">
                        <img th:if="${message.sender.avatarUrl != null && !message.sender.avatarUrl.isBlank()}" th:src="${message.sender.avatarUrl}" th:alt="${message.sender.fullName}">
                        <span th:if="${message.sender.avatarUrl == null || message.sender.avatarUrl.isBlank()}"
                              th:text="${#strings.substring(message.sender.fullName, 0, 1)}">U</span>
                    </span>
                    <div>
                        <strong th:text="${message.sender.fullName}">Автор</strong>
                        <p th:text="${message.body}">Текст</p>
                        <small>
                            <span th:text="${#temporals.format(message.sentAt, 'HH:mm')}">20:51</span>
                            <span th:if="${message.sender.username.equalsIgnoreCase(currentUser.username)}"> · отправлено</span>
                        </small>
                    </div>
                </article>
            </div>
            <form class="ajax-chat-form" th:action="@{/ajax/products/{id}/messages/{username}(id=${product.id}, username=${counterpart.username})}" th:object="${chatMessageForm}" method="post">
                <textarea th:field="*{body}" rows="3" placeholder="Сообщение"></textarea>
                <button class="primary-button" type="submit">Отправить</button>
            </form>
        </section>
    </div>
</main>
</body>
</html>
