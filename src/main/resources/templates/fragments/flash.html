<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="flash-stack" th:fragment="flash">
    <div class="flash success" th:if="${success}" th:text="${success}">Готово</div>
    <div class="flash danger" th:if="${error}" th:text="${error}">Ошибка</div>
</section>
</body>
</html>
